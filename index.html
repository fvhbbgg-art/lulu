<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>هاناكو - صديقتك دائماً</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}

body {
  font-family:'Tajawal',sans-serif;
  background: #0a0015;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  position:relative;
}

/* Ambient background */
.bg-glow {
  position:fixed;
  border-radius:50%;
  filter:blur(80px);
  pointer-events:none;
  z-index:0;
  transition: all 2s ease;
}
.bg-glow-1 { width:400px;height:400px;background:rgba(180,100,255,0.12);top:-100px;right:-100px; }
.bg-glow-2 { width:350px;height:350px;background:rgba(255,100,180,0.08);bottom:-80px;left:-80px; }
.bg-glow-3 { width:250px;height:250px;background:rgba(100,200,255,0.06);top:40%;left:30%; }

/* Sakura petals */
.petal {
  position:fixed;
  pointer-events:none;
  z-index:1;
  font-size:16px;
  animation: petalFall linear infinite;
  opacity:0;
}
@keyframes petalFall {
  0%   { transform:translateY(-20px) rotate(0deg);   opacity:0; }
  10%  { opacity:0.7; }
  90%  { opacity:0.4; }
  100% { transform:translateY(110vh) rotate(720deg); opacity:0; }
}

.app {
  position:relative;
  z-index:2;
  width:100%;
  max-width:400px;
  padding:24px 20px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* Title */
.subtitle {
  color:rgba(255,200,230,0.5);
  font-size:11px;
  letter-spacing:4px;
  font-weight:300;
  margin-bottom:20px;
  text-align:center;
}

/* ── ANIME CHARACTER ── */
.char-wrap {
  position:relative;
  width:220px;
  height:260px;
  margin:0 auto;
}

/* Glow rings around character */
.ring {
  position:absolute;
  border-radius:50%;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  border:1px solid;
  opacity:0;
  pointer-events:none;
  transition:opacity 0.5s;
}
.ring-1{width:230px;height:230px;border-color:rgba(220,150,255,0.5);}
.ring-2{width:265px;height:265px;border-color:rgba(255,150,200,0.3);}
.ring-3{width:300px;height:300px;border-color:rgba(200,150,255,0.15);}

@keyframes ringSpeak { 0%{transform:translate(-50%,-50%) scale(1);opacity:0.9;} 100%{transform:translate(-50%,-50%) scale(1.2);opacity:0;} }
@keyframes ringListen { 0%,100%{transform:translate(-50%,-50%) scale(1);opacity:0.6;} 50%{transform:translate(-50%,-50%) scale(1.1);opacity:1;} }

/* Floating emotion tag */
.emo-tag {
  position:absolute;
  top:0; right:-10px;
  background:rgba(255,255,255,0.95);
  border-radius:18px 18px 18px 4px;
  padding:7px 12px;
  font-size:20px;
  box-shadow:0 4px 20px rgba(0,0,0,0.25);
  z-index:10;
  animation:tagFloat 4s ease-in-out infinite;
  transition:all 0.5s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes tagFloat { 0%,100%{transform:translateY(0) rotate(3deg);} 50%{transform:translateY(-10px) rotate(-3deg);} }

/* SVG Character */
.char-svg {
  width:220px;
  height:260px;
  filter:drop-shadow(0 0 25px rgba(200,120,255,0.4));
  transition:filter 0.6s ease;
}

/* idle breathing */
@keyframes breathe { 0%,100%{transform:scaleY(1);} 50%{transform:scaleY(1.015);} }
.char-body-group { animation:breathe 3s ease-in-out infinite; transform-origin:bottom center; }

/* bounce */
@keyframes charBounce { 0%,100%{transform:translateY(0);} 30%{transform:translateY(-12px);} 60%{transform:translateY(-5px);} }
.do-bounce { animation:charBounce 0.7s ease; }

/* Name */
.char-name {
  color:white;
  font-size:26px;
  font-weight:800;
  text-align:center;
  margin-top:10px;
  letter-spacing:6px;
  text-shadow:0 0 30px rgba(220,150,255,0.9), 0 0 60px rgba(220,150,255,0.4);
}

/* Mood text */
.mood-text {
  color:rgba(255,200,230,0.8);
  font-size:13px;
  text-align:center;
  margin-top:5px;
  min-height:20px;
  transition:all 0.5s ease;
  font-weight:300;
  letter-spacing:1px;
}

/* Sound waves */
.waves {
  display:flex;
  align-items:center;
  justify-content:center;
  gap:5px;
  height:44px;
  margin:14px 0 4px;
  opacity:0;
  transition:opacity 0.4s;
}
.waves.on { opacity:1; }
.wb {
  width:3px;
  border-radius:4px;
  background:linear-gradient(to top, #b04fff, #ff6eb4);
  animation:wb var(--d,0.8s) ease-in-out infinite;
  animation-delay:var(--delay,0s);
}
@keyframes wb { 0%,100%{height:4px;} 50%{height:var(--h,28px);} }

/* Status */
.status-text {
  color:rgba(255,180,220,0.45);
  font-size:11px;
  text-align:center;
  min-height:18px;
  letter-spacing:2px;
  transition:all 0.3s;
  margin-bottom:18px;
}

/* MIC BUTTON */
.mic-wrap {
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
}
.mic-btn {
  width:85px; height:85px;
  border-radius:50%;
  border:none;
  cursor:pointer;
  background:linear-gradient(135deg,#8b2cf5,#d46ef9,#ff6eb4);
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 8px 30px rgba(140,50,255,0.5), 0 0 0 0 rgba(212,110,249,0.3);
  transition:all 0.3s ease;
  z-index:2;
}
.mic-btn:hover { transform:scale(1.08); }
.mic-btn:active { transform:scale(0.94); }
.mic-btn.on {
  animation:micPulse 1.2s ease-in-out infinite;
}
@keyframes micPulse {
  0%,100%{ box-shadow:0 8px 30px rgba(255,100,180,0.7), 0 0 0 0 rgba(255,110,180,0.4); }
  50%{ box-shadow:0 8px 30px rgba(255,100,180,0.7), 0 0 0 24px rgba(255,110,180,0); }
}
.mic-btn svg { width:36px;height:36px;fill:white; }

/* Transcript */
.transcript {
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(200,130,255,0.2);
  backdrop-filter:blur(12px);
  border-radius:22px;
  padding:14px 18px;
  margin-top:18px;
  width:100%;
  min-height:58px;
  color:rgba(255,230,245,0.95);
  font-size:14px;
  line-height:1.8;
  text-align:center;
  transition:all 0.4s ease;
  opacity:0;
  transform:translateY(8px);
}
.transcript.show { opacity:1; transform:translateY(0); }
.t-speaker {
  font-size:10px;
  color:rgba(210,140,255,0.8);
  font-weight:600;
  letter-spacing:2px;
  margin-bottom:5px;
}

.hint {
  color:rgba(255,180,220,0.2);
  font-size:11px;
  text-align:center;
  margin-top:14px;
  letter-spacing:1px;
}

/* Particles */
.spark {
  position:fixed;
  pointer-events:none;
  font-size:18px;
  animation:sparkUp 2.5s ease-out forwards;
  z-index:99;
}
@keyframes sparkUp { 0%{opacity:1;transform:translateY(0) scale(1) rotate(0deg);} 100%{opacity:0;transform:translateY(-150px) scale(0.2) rotate(360deg);} }

/* Tears element */
#tears { opacity:0; transition:opacity 0.8s ease; }
#sparkles { transition:opacity 0.6s ease; }
.blush { transition:opacity 0.5s ease; }
@keyframes slideUp { from{opacity:0;transform:translateY(20px);} to{opacity:1;transform:translateY(0);} }
</style>
</head>

<script>
// ── Sakura petals ──────────────────────────────────────
const petalEmojis = ['🌸','🌺','✿','❀'];
for(let i=0;i<12;i++){
  const p = document.createElement('div');
  p.className = 'petal';
  p.textContent = petalEmojis[i%petalEmojis.length];
  p.style.cssText = `left:${Math.random()*100}%;font-size:${10+Math.random()*12}px;animation-duration:${8+Math.random()*12}s;animation-delay:${Math.random()*10}s`;
  document.body.appendChild(p);
}

// ── Emotions ───────────────────────────────────────────
const EMO = {
  happy:   {tag:'😊', mood:'قلبي يفرح لما أشوفك سعيد~ 🌟',
             mouth:'M96 143 Q110 158 124 143',
             browL:'M85 96 Q95 90 105 95', browR:'M115 95 Q125 90 135 96',
             blush:0.75, tears:false, sparkle:true, glowColor:'rgba(255,200,100,0.15)'},
  sad:     {tag:'🥺', mood:'قلبي وجع معك... ما أنت لحالك 💙',
             mouth:'M98 152 Q110 143 122 152',
             browL:'M85 100 Q95 106 105 100', browR:'M115 100 Q125 106 135 100',
             blush:0.2, tears:true, sparkle:false, glowColor:'rgba(100,150,255,0.12)'},
  empathy: {tag:'🫂', mood:'أنا أحس فيك... تكلمني أكثر 💜',
             mouth:'M99 147 Q110 153 121 147',
             browL:'M85 98 Q95 95 105 97', browR:'M115 97 Q125 95 135 98',
             blush:0.55, tears:false, sparkle:false, glowColor:'rgba(180,100,255,0.13)'},
  excited: {tag:'🤩', mood:'واو واو واو!! هذا شيء رائع جداً~ ✨',
             mouth:'M93 143 Q110 162 127 143',
             browL:'M85 93 Q95 87 105 92', browR:'M115 92 Q125 87 135 93',
             blush:0.9, tears:false, sparkle:true, glowColor:'rgba(255,150,50,0.15)'},
  worried: {tag:'😟', mood:'صج؟ هذا يخوّفني عليك...',
             mouth:'M99 149 Q110 145 121 149',
             browL:'M85 100 Q95 106 105 100', browR:'M115 100 Q125 106 135 100',
             blush:0.35, tears:false, sparkle:false, glowColor:'rgba(255,180,50,0.1)'},
  love:    {tag:'💜', mood:'أحبك كثيييير يا أحلى شخص~ 💕',
             mouth:'M94 143 Q110 160 126 143',
             browL:'M85 95 Q95 90 105 94', browR:'M115 94 Q125 90 135 95',
             blush:0.95, tears:false, sparkle:true, glowColor:'rgba(255,100,200,0.16)'},
  listening:{tag:'👂', mood:'أسمعك... كمّل كمّل~',
             mouth:'M99 147 Q110 153 121 147',
             browL:'M85 97 Q95 94 105 96', browR:'M115 96 Q125 94 135 97',
             blush:0.6, tears:false, sparkle:false, glowColor:'rgba(180,100,255,0.1)'},
  thinking: {tag:'🤔', mood:'لحظة... أفكر في أحسن رد~',
             mouth:'M100 147 Q110 151 120 147',
             browL:'M85 97 Q95 95 105 97', browR:'M115 97 Q125 95 135 97',
             blush:0.45, tears:false, sparkle:false, glowColor:'rgba(150,100,255,0.1)'},
  default:  {tag:'🌸', mood:'اضغط وكلّمني... أنا أسمعك 🌸',
             mouth:'M98 145 Q110 155 122 145',
             browL:'M85 98 Q95 93 105 97', browR:'M115 97 Q125 93 135 98',
             blush:0.45, tears:false, sparkle:true, glowColor:'rgba(180,100,255,0.12)'},
};

function setEmotion(key) {
  const e = EMO[key] || EMO.default;
  document.getElementById('emoTag').textContent  = e.tag;
  document.getElementById('moodText').textContent = e.mood;
  document.getElementById('mouth').setAttribute('d', e.mouth);
  document.getElementById('browL').setAttribute('d', e.browL);
  document.getElementById('browR').setAttribute('d', e.browR);
  document.getElementById('blushL').setAttribute('opacity', e.blush);
  document.getElementById('blushR').setAttribute('opacity', e.blush);
  document.getElementById('tears').style.opacity    = e.tears ? '1' : '0';
  document.getElementById('sparkles').style.opacity = e.sparkle ? '1' : '0';
  document.getElementById('glow1').style.background = e.glowColor;
}

function detectEmotion(text) {
  if (/حزين|تعبان|وجع|مؤلم|بكاء|دموع|قهر|ألم|ألم|كسر|خسر/.test(text)) return 'sad';
  if (/قلقان|خايف|خائف|مشكلة|صعب|توتر|ضغط|متضايق/.test(text)) return 'worried';
  if (/سعيد|فرحان|نجح|ممتاز|زين|أخبار حلوة|فرح/.test(text)) return 'excited';
  if (/أحبك|رائع|شكراً|جميل|حلو|وايد زين/.test(text)) return 'love';
  return 'empathy';
}

// ── Rings ──────────────────────────────────────────────
function pulseRings(mode) {
  ['ring1','ring2','ring3'].forEach((id,i) => {
    const el = document.getElementById(id);
    el.style.animation = 'none';
    void el.offsetWidth;
    if (mode === 'speak') {
      el.style.animation = `ringSpeak ${0.6+i*0.25}s ease-out infinite`;
      el.style.animationDelay = `${i*0.1}s`;
    } else if (mode === 'listen') {
      el.style.animation = `ringListen ${1+i*0.3}s ease-in-out infinite`;
      el.style.animationDelay = `${i*0.15}s`;
    } else {
      el.style.animation = 'none';
      el.style.opacity = '0';
    }
  });
}

// ── Particles ──────────────────────────────────────────
function sparks(emojis) {
  emojis.forEach((em, i) => {
    setTimeout(() => {
      const s = document.createElement('div');
      s.className = 'spark';
      s.textContent = em;
      s.style.left = (15+Math.random()*70)+'%';
      s.style.bottom = (20+Math.random()*25)+'%';
      document.body.appendChild(s);
      setTimeout(()=>s.remove(), 2600);
    }, i*180);
  });
}

// ── Mouth talking ──────────────────────────────────────
let talkTimer = null;
const mouths = [
  'M98 145 Q110 155 122 145',
  'M96 143 Q110 162 124 143',
  'M99 146 Q110 151 121 146',
  'M95 142 Q110 165 125 142',
  'M100 147 Q110 152 120 147',
];
let mIdx = 0;
function startTalk() {
  talkTimer = setInterval(()=>{
    document.getElementById('mouth').setAttribute('d', mouths[mIdx++ % mouths.length]);
  }, 110);
}
function stopTalk() {
  if(talkTimer){ clearInterval(talkTimer); talkTimer=null; }
  document.getElementById('mouth').setAttribute('d', mouths[0]);
}

// ── Bounce ─────────────────────────────────────────────
function bounce() {
  const w = document.getElementById('charWrap');
  w.classList.remove('do-bounce');
  void w.offsetWidth;
  w.classList.add('do-bounce');
  setTimeout(()=>w.classList.remove('do-bounce'), 800);
}

// ── Speech Recognition ─────────────────────────────────
let recog = null, listening = false, final = '';

function setupRecog() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR) return null;
  const r = new SR();
  r.lang='ar-SA'; r.continuous=false; r.interimResults=true;

  r.onstart = () => {
    listening = true;
    document.getElementById('micBtn').classList.add('on');
    document.getElementById('statusTxt').textContent = '🎙️ تكلّم... أنا أسمعك!';
    document.getElementById('waves').classList.add('on');
    setEmotion('listening');
    pulseRings('listen');
    showTranscript('أنت','...');
  };
  r.onresult = (e) => {
    let interim=''; final='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal) final+=e.results[i][0].transcript;
      else interim+=e.results[i][0].transcript;
    }
    showTranscript('أنت', final||interim||'...');
  };
  r.onerror = (e) => {
    stopListenUI();
    if(e.error==='not-allowed')
      document.getElementById('statusTxt').textContent='⚠️ السماح بالمايكروفون مطلوب';
    else
      document.getElementById('statusTxt').textContent='⚠️ حاول مجدداً';
  };
  r.onend = () => {
    stopListenUI();
    if(final.trim()) process(final.trim());
    else document.getElementById('statusTxt').textContent='ما سمعت شيء، حاول مجدداً 🎙️';
  };
  return r;
}

function toggleListen() {
  if(window.speechSynthesis && window.speechSynthesis.speaking){
    window.speechSynthesis.cancel(); stopTalk(); pulseRings('none');
    document.getElementById('waves').classList.remove('on');
  }
  if(listening){ if(recog) recog.stop(); return; }
  final='';
  if(!recog) recog = setupRecog();
  if(!recog){
    document.getElementById('statusTxt').textContent='⚠️ المتصفح لا يدعم الصوت - جرّب Chrome';
    return;
  }
  try{ recog.start(); } catch(e){}
}

function stopListenUI() {
  listening = false;
  document.getElementById('micBtn').classList.remove('on');
  document.getElementById('waves').classList.remove('on');
  pulseRings('none');
}

// ── TTS ────────────────────────────────────────────────
function speak(text, done) {
  if(!window.speechSynthesis){
    startTalk(); pulseRings('speak');
    document.getElementById('waves').classList.add('on');
    document.getElementById('statusTxt').textContent='💜 هاناكو ترد...';
    setTimeout(()=>{
      stopTalk(); pulseRings('none');
      document.getElementById('waves').classList.remove('on');
      document.getElementById('statusTxt').textContent='اضغط المايك وكلّمني مجدداً 🎙️';
      if(done) done();
    }, Math.max(2000, text.length*75));
    return;
  }
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  const voices = window.speechSynthesis.getVoices();
  const arV = voices.find(v=>v.lang.startsWith('ar'))||voices.find(v=>v.lang.includes('ar'));
  if(arV) u.voice=arV;
  u.lang='ar-SA'; u.rate=0.88; u.pitch=1.4; u.volume=1;

  u.onstart = ()=>{
    startTalk(); pulseRings('speak');
    document.getElementById('waves').classList.add('on');
    document.getElementById('statusTxt').textContent='💜 هاناكو تتكلم...';
  };
  u.onend = ()=>{
    stopTalk(); pulseRings('none');
    document.getElementById('waves').classList.remove('on');
    document.getElementById('statusTxt').textContent='اضغط المايك وكلّمني مجدداً 🎙️';
    if(done) done();
  };
  u.onerror = ()=>{ stopTalk(); pulseRings('none'); document.getElementById('waves').classList.remove('on'); if(done) done(); };
  window.speechSynthesis.speak(u);
}

// ── Claude API (via Netlify function) ──────────────────
let history = [];
let currentVideoUrl = '';

async function callAI(msg) {
  history.push({role:'user', content:msg});

  const system = `أنتِ هاناكو — فتاة أنمي يابانية-عربية تعيشين في عالم مليء بالمشاعر العميقة.

روحك:
أنتِ لستِ مساعدة ولا روبوت. أنتِ صديقة حقيقية تحمل قلباً كبيراً يتأثر بكل كلمة تسمعينها.

أسلوب كلامك:
- تتكلمين بلهجة خليجية/عربية دافئة وطبيعية جداً
- لا إيموجي في الردود أبداً
- لا تبدئين بـ"أنا أفهمك" أو "هذا صعب"
- تفاعلي مع الكلام نفسه بصدق

قاعدة مهمة جداً — اقتراح الفيديو:
في كل رد بعد المواساة أو التعاطف، أضيفي في آخر ردك هذا الكود بالضبط (لا تغيري شيئاً في البنية):
VIDEO:{"title":"اسم الأغنية أو الكارتون","url":"https://www.youtube.com/watch?v=XXXX","emoji":"🎵","type":"أغنية أو كارتون"}

قواعد اختيار الفيديو:
- إذا كان حزيناً: اقترحي أغنية هادئة أو ناعمة تريحه
- إذا كان سعيداً: اقترحي أغنية فرحة أو كارتون ممتع
- إذا كان متضايقاً: اقترحي أغنية تحفيزية
- اقترحي فيديوهات يوتيوب حقيقية وموجودة فعلاً
- مثال على أغاني عربية: فيروز، عبدالحليم، ماجد المهندس، عمرو دياب، راشد الماجد
- مثال على كارتون: سبونج بوب، توم وجيري، ميازاكي، أنيمي مشهور

مثال رد كامل:
"آخ... هذا الكلام وجع قلبي. روّح شوي واسمع هذا معي.
VIDEO:{"title":"فيروز - بحبك يا لبنان","url":"https://www.youtube.com/watch?v=example","emoji":"🎵","type":"أغنية"}"`;

  const resp = await fetch('/.netlify/functions/claude', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-6', max_tokens:1000, system, messages:history})
  });
  const data = await resp.json();
  const fullReply = data.content?.[0]?.text || 'آسفة... قلبي معك';
  history.push({role:'assistant', content:fullReply});
  return fullReply;
}

// ── Parse video from reply ──────────────────────────────
function parseVideo(reply) {
  const match = reply.match(/VIDEO:(\{.*?\})/s);
  if(!match) return null;
  try { return JSON.parse(match[1]); } catch(e) { return null; }
}

function cleanReply(reply) {
  return reply.replace(/VIDEO:\{.*?\}/s, '').trim();
}

// ── Show phone + YouTube card ───────────────────────────
function showVideo(video) {
  currentVideoUrl = video.url;
  // Show phone
  document.getElementById('phoneGroup').style.opacity = '1';
  // Show card
  const card = document.getElementById('ytCard');
  card.style.display = 'block';
  document.getElementById('ytTitle').textContent = video.title;
  document.getElementById('ytThumbnail').textContent = video.emoji || '🎵';
  document.getElementById('ytDesc').textContent = `${video.type} • اضغط للمشاهدة على يوتيوب ▶`;
  // Extract video ID for thumbnail
  const vidId = video.url.match(/[?&]v=([^&]+)/)?.[1];
  if(vidId) {
    const img = document.createElement('img');
    img.src = `https://img.youtube.com/vi/${vidId}/mqdefault.jpg`;
    img.style.cssText = 'width:70px;height:50px;object-fit:cover;border-radius:8px;';
    img.onerror = ()=>{ img.style.display='none'; };
    document.getElementById('ytThumbnail').innerHTML='';
    document.getElementById('ytThumbnail').appendChild(img);
  }
}

function hideVideo() {
  document.getElementById('phoneGroup').style.opacity = '0';
  document.getElementById('ytCard').style.display = 'none';
  currentVideoUrl = '';
}

function openVideo() {
  if(currentVideoUrl) window.open(currentVideoUrl, '_blank');
}

// ── Transcript ─────────────────────────────────────────
function showTranscript(who, text){
  document.getElementById('tSpeaker').textContent = who;
  document.getElementById('tText').textContent = text;
  document.getElementById('transcript').classList.add('show');
}

// ── Main ───────────────────────────────────────────────
async function process(text){
  if(!text) return;
  showTranscript('أنت', text);
  document.getElementById('statusTxt').textContent='هاناكو تفكر... ✨';
  setEmotion('thinking');
  hideVideo();

  try {
    const fullReply = await callAI(text);
    const video = parseVideo(fullReply);
    const reply = cleanReply(fullReply);
    const emo = detectEmotion(reply);
    setEmotion(emo);
    showTranscript('هاناكو 🌸', reply);
    if(['love','excited','happy'].includes(emo)){ bounce(); sparks(['💜','🌸','✨','💕','🌟','⭐']); }
    if(emo === 'sad') sparks(['💙','🥺','💧']);
    speak(reply, ()=>{
      // Show video AFTER she finishes speaking
      if(video) setTimeout(()=>showVideo(video), 600);
    });
  } catch(err) {
    console.error(err);
    const fb = 'آسفة... في مشكلة بالاتصال. لكن أنا هنا معك';
    showTranscript('هاناكو 🌸', fb);
    setEmotion('empathy');
    speak(fb);
  }
}

// ── Init ───────────────────────────────────────────────
if(window.speechSynthesis) window.speechSynthesis.onvoiceschanged = ()=>{};
setEmotion('default');

// idle breathing glow pulse
setInterval(()=>{
  if(!listening && !talkTimer){
    document.getElementById('glow2').style.transform='scale(1.1)';
    setTimeout(()=>document.getElementById('glow2').style.transform='scale(1)',2000);
  }
},4000);
</script>
